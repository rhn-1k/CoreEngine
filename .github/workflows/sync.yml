name: Sync Version to Web

on:
  workflow_dispatch:
  push:
    paths:
      - 'version.txt'

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch CoreEngine Source
        run: |
          git clone https://${{ secrets.GIT_TOKEN }}@github.com/rhn-1k/Coreproject.git core_temp
          cp -r core_temp/* .
          rm -rf core_temp
          chmod +x *.sh scripts/*.sh 2>/dev/null || true

      - name: LS
        run: |
          echo "Listing files:"
          ls -a

      - name: Generate Version JSON
        run: |
          if [ -f "gen_version.sh" ]; then
              bash gen_version.sh
          else
              echo "ERROR: gen_version.sh not found."
              exit 1
          fi

      - name: Commit and Push Version Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add core/etc/web/data/version.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Web: Sync version to $(cat version.txt | cut -d',' -f1)" && git push)
